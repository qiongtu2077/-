<!-- forum.html -->
<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>论坛首页</title></head>
<body>
  <h2>论坛列表</h2>
  <div id="controls">
    <button onclick="sortByDate()">按时间排序</button>
    <button onclick="sortByLike()">按点赞排序</button>
    <button onclick="logout()">退出登录</button>
  </div>
  <div id="postList"></div>
  <script>
    let sort = 'time';
    const token = localStorage.getItem("token");
    if (!token) location.href = '/login.html';

    function fetchPosts() {
      const query = sort === 'like' ? '?sort=like' : '';
      fetch('/posts' + query)
        .then(res => res.json())
        .then(posts => {
          const container = document.getElementById('postList');
          container.innerHTML = '';
          posts.forEach(p => {
            const div = document.createElement('div');
            div.innerHTML = `<hr><h3>${p.title}</h3><p>${p.content}</p><p>作者: ${p.nickname} | 点赞: ${p.like_count} | 时间: ${p.post_date}</p>
              <button onclick="likePost(${p.post_id})">点赞/取消</button>
              <button onclick="replyTo(${p.post_id})">回复</button>`;
            container.appendChild(div);
          });
        });
    }

    function likePost(id) {
      fetch('/like', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ target_type: 'post', target_id: id })
      })
      .then(res => res.text())
      .then(msg => {
        alert(msg);
        fetchPosts();
      });
    }

    function sortByDate() {
      sort = 'time';
      fetchPosts();
    }

    function sortByLike() {
      sort = 'like';
      fetchPosts();
    }

    function logout() {
      localStorage.removeItem("token");
      location.href = '/login.html';
    }

    function replyTo(postId) {
      const content = prompt("请输入回复内容：");
      if (!content) return;
      fetch('/reply', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ post_id: postId, content })
      })
      .then(res => res.text())
      .then(msg => {
        alert(msg);
        fetchPosts();
      });
    }

    fetchPosts();
  </script>
</body>
</html>
