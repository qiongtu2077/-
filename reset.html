<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>密码重置</title>
  <style>
    body {
      font-family: "微软雅黑", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to right, #fce4ec, #e0f7fa);
      margin: 0;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      width: 400px;
      position: relative;
    }
    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 24px;
    }
    input {
      width: 100%;
      margin-bottom: 15px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #ff7043;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #f4511e;
    }
    .link {
      text-align: center;
      margin-top: 12px;
    }
    .link a {
      color: #0288d1;
      cursor: pointer;
      text-decoration: none;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
    }
    .link a:hover {
      text-decoration: underline;
    }
    .link svg {
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>重置密码</h2>
    <input id="nickname" placeholder="请输入昵称">
    <input id="newPwd" type="password" placeholder="新密码">
    <input id="confirmPwd" type="password" placeholder="再次输入新密码">
    <button onclick="resetPwd()">提交</button>
    <div class="link">
      <a onclick="window.location.href='/register.html'">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M15 8a.5.5 0 0 1-.5.5H3.707l3.147 3.146a.5.5 0 0 1-.708.708l-4-4a.5.5 0 0 1 0-.708l4-4a.5.5 0 0 1 .708.708L3.707 7.5H14.5a.5.5 0 0 1 .5.5z"/>
        </svg>
        返回登录
      </a>
    </div>
  </div>

  <script>
    function resetPwd() {
      const nickname = document.getElementById("nickname").value.trim();
      const newPwd = document.getElementById("newPwd").value.trim();
      const confirmPwd = document.getElementById("confirmPwd").value.trim();

      if (!nickname || !newPwd || !confirmPwd || nickname.includes(' ') || newPwd.includes(' ') || confirmPwd.includes(' ')) {
        alert("昵称和密码不能为空，且不能包含空格");
        return;
      }
      if (newPwd !== confirmPwd) {
        alert("两次密码输入不一致");
        return;
      }
      if (newPwd.length > 20) {
        alert("新密码不能超过20字符");
        return;
      }

      fetch('/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nickname, password: newPwd })
      })
      .then(res => res.text())
      .then(msg => {
        alert(msg);
        if (msg.includes("成功")) window.location.href = '/login.html';
      });
    }
  </script>
</body>
</html>
