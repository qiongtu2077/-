<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>зҷ»еҪ•</title></head>
<body>
  <h2>зҷ»еҪ•</h2>
  <input id="nickname" placeholder="жҳөз§°"><br>
  <input id="password" type="password" placeholder="еҜҶз Ғ"><br>
  <button onclick="login()">зҷ»еҪ•</button>
  <script>
    function login() {
      fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nickname: document.getElementById('nickname').value,
          password: document.getElementById('password').value
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.token) {
          localStorage.setItem('token', data.token);
          window.location.href = '/forum.html';
        } else alert("зҷ»еҪ•еӨұиҙҘ");
      });
    }
  </script>
</body>
</html>
